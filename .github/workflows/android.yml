name: Build Android Studio APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP Project'
        required: true
      tag:
        description: 'Tag Build'
        required: true
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Project ZIP
        run: |
          curl -L -o project.zip "${{ inputs.zip_url }}"
          unzip -q project.zip -d ./project

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant Permission
        working-directory: ./project
        run: chmod +x ./gradlew

      - name: Build APK
        working-directory: ./project
        run: |
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            ./gradlew assembleDebug --stacktrace
          else
            ./gradlew assembleRelease --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-result
          path: ./project/app/build/outputs/apk/**/*.apk
