name: Build Android Studio APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file'
        required: true
      tag:
        description: 'Release tag'
        required: true
      build_type:
        description: 'Build type'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download ZIP
        run: |
          echo "Downloading from: ${{ github.event.inputs.zip_url }}"
          
          # Coba download langsung
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          
          # Cek validitas ZIP
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ ZIP invalid, coba dengan API header..."
            curl -L \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              -o project.zip \
              "${{ github.event.inputs.zip_url }}"
          fi
          
          # Verifikasi
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ ZIP masih invalid!"
            ls -la project.zip
            file project.zip
            head -c 500 project.zip
            exit 1
          fi
          
          echo "✅ ZIP valid!"

      - name: Extract & Find Project
        run: |
          unzip project.zip -d project/
          cd project
          # Cari build.gradle atau build.gradle.kts
          ROOT_DIR=$(find . -name "build.gradle*" -not -path "*/.*" | head -1 | xargs dirname)
          if [ -z "$ROOT_DIR" ]; then
            echo "❌ build.gradle tidak ditemukan!"
            ls -la
            find . -maxdepth 3 -name "*.gradle*"
            exit 1
          fi
          echo "PROJECT_ROOT=$ROOT_DIR" >> $GITHUB_ENV
          echo "✅ Project root: $ROOT_DIR"

      - name: Make gradlew executable
        run: |
          cd ${{ env.PROJECT_ROOT }}
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "❌ gradlew tidak ditemukan!"
            find . -name "gradlew"
            exit 1
          fi

      - name: Build APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: ${{ env.PROJECT_ROOT }}/app/build/outputs/apk/**/*.apk
