name: Build Android Studio APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP project Android Studio'
        required: true
      tag:
        description: 'Release tag'
        required: true
      build_type:
        description: 'Build type: debug atau release'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip
      
      - name: Download Project ZIP
        run: |
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          unzip project.zip -d project/
      
      - name: Build APK
        working-directory: ./project
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: |
            project/app/build/outputs/apk/debug/*.apk
            project/app/build/outputs/apk/release/*.apk
          retention-days: 1
