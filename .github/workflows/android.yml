name: Build Android Studio APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file'
        required: true
      tag:
        description: 'Release tag'
        required: true
      build_type:
        description: 'Build type'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download ZIP
        run: |
          echo "Downloading from: ${{ github.event.inputs.zip_url }}"
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ ZIP invalid, coba dengan API header..."
            curl -L \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              -o project.zip \
              "${{ github.event.inputs.zip_url }}"
          fi
          
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ ZIP masih invalid!"
            ls -la project.zip
            file project.zip
            head -c 500 project.zip
            exit 1
          fi
          echo "✅ ZIP valid!"

      - name: Extract & Find Project
        run: |
          unzip -q project.zip -d project/
          cd project
          
          echo "Isi folder setelah extract:"
          ls -la
          
          # Cari build.gradle atau build.gradle.kts
          GRADLE=$(find . -name "build.gradle" -o -name "build.gradle.kts" | grep -v "android/build" | head -1)
          if [ -z "$GRADLE" ]; then
            echo "❌ build.gradle tidak ditemukan!"
            find . -maxdepth 3 -name "*.gradle*"
            exit 1
          fi
          
          echo "Found build.gradle at: $GRADLE"
          
          # Ambil folder parent dari build.gradle (root project)
          ROOT_DIR=$(dirname "$GRADLE")
          
          if [ "$ROOT_DIR" = "." ]; then
            FULL_ROOT="$PWD"
          else
            FULL_ROOT="$PWD/$ROOT_DIR"
          fi
          
          echo "PROJECT_ROOT=$FULL_ROOT" >> $GITHUB_ENV
          echo "✅ Project root: $FULL_ROOT"
          ls -la "$FULL_ROOT"

      - name: Make gradlew executable
        run: |
          cd "${{ env.PROJECT_ROOT }}"
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "❌ gradlew tidak ditemukan!"
            find . -name "gradlew"
            exit 1
          fi

      - name: Build APK
        run: |
          cd "${{ env.PROJECT_ROOT }}"
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: ${{ env.PROJECT_ROOT }}/app/build/outputs/apk/**/*.apk
