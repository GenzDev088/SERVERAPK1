name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP project Flutter (browser_download_url)'
        required: true
      tag:
        description: 'Release tag'
        required: true
      build_type:
        description: 'Build type: debug atau release'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip
      
      # ── Download ZIP (gak perlu auth kalau pake browser_download_url) ──
      - name: Download Project ZIP
        run: |
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          unzip project.zip -d project/
      
      - name: Build APK
        working-directory: ./project
        run: |
          flutter pub get
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: project/build/app/outputs/flutter-apk/app-*.apk
          retention-days: 1
