# ═══════════════════════════════════════════════════════════════════════════
#  FLUTTER BUILD WORKFLOW — Dipanggil oleh Telegram Bot via workflow_dispatch
# ═══════════════════════════════════════════════════════════════════════════
name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL asset ZIP"
        required: true
        type: string
      tag:
        description: "Tag name"
        required: true
        type: string
      build_type:
        description: "release atau debug"
        required: false
        default: "release"
        type: string

permissions:
  contents: write
  actions: read

jobs:
  flutter-build:
    name: "Build Flutter APK"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true

      - name: Download project ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP_URL="${{ inputs.zip_url }}"
          echo "Original URL: $ZIP_URL"
          DL_URL=""

          if echo "$ZIP_URL" | grep -q "api.github.com"; then
            echo "Mode: API URL"
            DL_URL="$ZIP_URL"
          elif echo "$ZIP_URL" | grep -q "github.com.*releases/download"; then
            echo "Mode: Browser URL - converting to API URL"
            ASSET_FILE=$(basename "$ZIP_URL")
            REPO_PATH=$(echo "$ZIP_URL" | sed 's|https://github.com/||' | cut -d'/' -f1,2)
            echo "Repo: $REPO_PATH | File: $ASSET_FILE"
            TAG_FROM_URL=$(echo "$ZIP_URL" | sed 's|.*/releases/download/||' | sed "s|/$ASSET_FILE||")
            echo "Tag: $TAG_FROM_URL"
            ASSET_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO_PATH}/releases" | \
              jq -r --arg fname "$ASSET_FILE" \
              '[.[] | .assets[] | select(.name == $fname) | .id] | first // empty')
            if [ -z "$ASSET_ID" ]; then
              echo "ERROR: Asset ID not found for $ASSET_FILE"
              exit 1
            fi
            DL_URL="https://api.github.com/repos/${REPO_PATH}/releases/assets/${ASSET_ID}"
            echo "Resolved API URL: $DL_URL"
          else
            echo "Mode: External URL"
            DL_URL="$ZIP_URL"
          fi

          curl -L --fail -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            -o project.zip "$DL_URL"

          FILE_SIZE=$(stat -c%s project.zip)
          echo "Downloaded: $FILE_SIZE bytes"

          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "ERROR: File too small ($FILE_SIZE bytes)"
            exit 1
          fi

          MAGIC=$(xxd -l 4 -p project.zip)
          if [ "$MAGIC" != "504b0304" ]; then
            echo "ERROR: Not a valid ZIP (magic: $MAGIC)"
            exit 1
          fi

          echo "ZIP OK: $(du -h project.zip | cut -f1)"

      - name: Extract project
        run: |
          mkdir -p project-src
          unzip -qo project.zip -d project-src
          PROJECT_DIR=""
          if [ -f project-src/pubspec.yaml ]; then
            PROJECT_DIR="project-src"
          else
            FOUND=$(find project-src -name "pubspec.yaml" -maxdepth 5 | head -1)
            if [ -n "$FOUND" ]; then
              PROJECT_DIR=$(dirname "$FOUND")
            fi
          fi
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: pubspec.yaml not found!"
            find project-src -maxdepth 3 -type f | head -30
            exit 1
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Found: $PROJECT_DIR"

      - name: Analyze Flutter project
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== pubspec.yaml ==="
          head -30 pubspec.yaml
          echo ""
          echo "=== Flutter doctor ==="
          flutter doctor -v 2>&1 | head -20
          echo ""
          echo "[RESULT_ANALYZE]"
          echo "Project: $(grep 'name:' pubspec.yaml | head -1)"
          echo "Flutter OK"
          echo "[END_RESULT_ANALYZE]"

      - name: Flutter pub get
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Build APK (${{ inputs.build_type }})
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Locate APK output
        id: apk
        run: |
          APK_FILE=$(find ${{ env.PROJECT_DIR }} -name "*.apk" -type f | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "ERROR: APK not found after build!"
            exit 1
          fi
          echo "APK: $APK_FILE ($(du -h "$APK_FILE" | cut -f1))"
          cp "$APK_FILE" ./output.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ inputs.tag }}
          path: ./output.apk
          retention-days: 1
          if-no-files-found: error
