name: Build APK (Flutter)

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Draft Release ID'
        required: true
        type: string
      asset_name:
        description: 'ZIP Asset Filename'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter 3.44.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Download source ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID="${{ inputs.release_id }}"
          ASSET_NAME="${{ inputs.asset_name }}"
          REPO="${{ github.repository }}"
          echo "=== Downloading ZIP from release $RELEASE_ID ==="
          ASSET_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/$RELEASE_ID/assets" \
            | jq -r '.[] | select(.name == "'"$ASSET_NAME"'") | .id')
          if [ -z "$ASSET_ID" ] || [ "$ASSET_ID" = "null" ]; then
            echo "::error::Asset '$ASSET_NAME' not found in release $RELEASE_ID"
            exit 1
          fi
          echo "Asset ID: $ASSET_ID"
          curl -sL -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/$REPO/releases/assets/$ASSET_ID" \
            -o source.zip
          FILESIZE=$(stat -c%s source.zip)
          echo "Downloaded: ${FILESIZE} bytes"
          MAGIC=$(xxd -l 4 -p source.zip)
          if [ "$MAGIC" != "504b0304" ]; then
            echo "::error::Invalid ZIP file (magic: $MAGIC, expected 504b0304)"
            exit 1
          fi
          echo "ZIP validation passed"

      - name: Extract source
        run: |
          unzip -qo source.zip -d project
          echo "=== Project structure (root) ==="
          ls -la project/

      - name: Patch incompatible packages
        run: |
          cd project
          echo "=== Checking pubspec.yaml ==="
          head -5 pubspec.yaml
          rm -f pubspec.lock
          if grep -q "font_awesome_flutter" pubspec.yaml 2>/dev/null; then
            echo "font_awesome_flutter found in pubspec.yaml, patching version"
            if ! grep -q "dependency_overrides:" pubspec.yaml; then
              printf '\ndependency_overrides:\n  font_awesome_flutter: 10.8.0\n' >> pubspec.yaml
            elif ! grep -A 50 "dependency_overrides:" pubspec.yaml | grep -q "font_awesome_flutter"; then
              sed -i '/dependency_overrides:/a\  font_awesome_flutter: 10.8.0' pubspec.yaml
            else
              echo "font_awesome_flutter already in dependency_overrides"
            fi
            sed -i 's/font_awesome_flutter: .*/font_awesome_flutter: 10.8.0/' pubspec.yaml
            echo "Patched font_awesome_flutter to 10.8.0"
          else
            echo "font_awesome_flutter not in direct deps, adding override as safety net"
            if ! grep -q "dependency_overrides:" pubspec.yaml; then
              printf '\ndependency_overrides:\n  font_awesome_flutter: 10.8.0\n' >> pubspec.yaml
            else
              sed -i '/dependency_overrides:/a\  font_awesome_flutter: 10.8.0' pubspec.yaml
            fi
          fi
          echo "=== Final pubspec.yaml tail ==="
          tail -10 pubspec.yaml

      - name: Install dependencies
        run: |
          cd project
          flutter pub get

      - name: Build APK
        run: |
          cd project
          flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: project/build/app/outputs/flutter-apk/*.apk
          retention-days: 1