name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file dari GitHub Release'
        required: true
      tag:
        description: 'Release tag'
        required: true
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'  # Sesuaikan versi Flutter
          channel: 'stable'

      - name: Download ZIP
        run: |
          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.event.inputs.zip_url }}" -o project.zip

      - name: Extract ZIP
        run: |
          unzip project.zip -d project/
          cd project
          # Cari folder root project (kadang ada subfolder)
          ROOT_DIR=$(find . -name "pubspec.yaml" -not -path "*/.*" | head -1 | xargs dirname)
          echo "PROJECT_ROOT=$ROOT_DIR" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter pub get

      - name: Build APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: ${{ env.PROJECT_ROOT }}/build/app/outputs/flutter-apk/*.apk
