name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP Project'
        required: true
      tag:
        description: 'Tag Build'
        required: true
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Project ZIP
        run: |
          curl -L -o project.zip "${{ inputs.zip_url }}"
          unzip -q project.zip -d ./project

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable

      - name: Get Dependencies
        working-directory: ./project
        run: flutter pub get

      - name: Build APK
        working-directory: ./project
        run: |
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-result
          path: ./project/build/app/outputs/flutter-apk/*.apk
