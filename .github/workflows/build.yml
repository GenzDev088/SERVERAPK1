name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file dari GitHub Release'
        required: true
      tag:
        description: 'Release tag'
        required: true
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.8.1'  # ✅ FIX: Sesuaikan dengan pubspec.yaml kamu
          channel: 'stable'

      - name: Download ZIP
        run: |
          echo "Downloading from: ${{ github.event.inputs.zip_url }}"
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ ZIP invalid, coba dengan API header..."
            curl -L \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              -o project.zip \
              "${{ github.event.inputs.zip_url }}"
          fi
          
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ ZIP masih invalid!"
            ls -la project.zip
            file project.zip
            head -c 500 project.zip
            exit 1
          fi
          echo "✅ ZIP valid!"

      - name: Extract ZIP
        run: |
          # ✅ FIX: Extract ke project/ dan simpan full path
          unzip -q project.zip -d project/
          cd project
          
          echo "Isi folder setelah extract:"
          ls -la
          
          # Cari pubspec.yaml
          PUBSPEC=$(find . -name "pubspec.yaml" -not -path "*/.*" | head -1)
          if [ -z "$PUBSPEC" ]; then
            echo "❌ pubspec.yaml tidak ditemukan!"
            find . -maxdepth 3 -type f
            exit 1
          fi
          
          echo "Found pubspec.yaml at: $PUBSPEC"
          
          # ✅ FIX: Ambil folder parent dari pubspec.yaml
          ROOT_DIR=$(dirname "$PUBSPEC")
          
          # Convert ke absolute path
          if [ "$ROOT_DIR" = "." ]; then
            FULL_ROOT="$PWD"
          else
            FULL_ROOT="$PWD/$ROOT_DIR"
          fi
          
          # ✅ FIX: Export ke GITHUB_ENV
          echo "PROJECT_ROOT=$FULL_ROOT" >> $GITHUB_ENV
          echo "✅ Project root: $FULL_ROOT"
          echo "✅ Isi project:"
          ls -la "$FULL_ROOT"

      - name: Install Dependencies
        run: |
          echo "PROJECT_ROOT: ${{ env.PROJECT_ROOT }}"
          cd "${{ env.PROJECT_ROOT }}"
          flutter pub get

      - name: Build APK
        run: |
          cd "${{ env.PROJECT_ROOT }}"
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: ${{ env.PROJECT_ROOT }}/build/app/outputs/flutter-apk/*.apk
