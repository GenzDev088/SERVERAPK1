name: Web to APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
      app_name:
        description: 'Nama Aplikasi'
        required: true
      icon_url:
        description: 'URL Icon PNG'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup JDK & Android SDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download Icon
        run: curl -L -o icon.png "${{ github.event.inputs.icon_url }}"
      
      - name: Generate WebView APK
        run: |
          # Ini contoh sederhana, bisa pake tool kaya WebViewGold atau custom
          # Atau pake Cordova/Capacitor untuk generate APK dari web
          echo "Generate APK dari ${{ github.event.inputs.web_url }}"
          # ... script generate APK ...
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-build
          path: '*.apk'
          retention-days: 1
