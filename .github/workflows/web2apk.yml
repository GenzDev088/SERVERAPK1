# ═══════════════════════════════════════════════════════════════════════════
#  WEB2APK BUILD WORKFLOW — Dipanggil oleh Telegram Bot
#  Mengubah website/URL menjadi APK menggunakan Node.js + puppeteer
# ═══════════════════════════════════════════════════════════════════════════
name: Web2APK Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "URL website yang akan dijadikan APK"
        required: true
        type: string
      app_name:
        description: "Nama aplikasi"
        required: true
        type: string
      icon_url:
        description: "URL icon aplikasi (opsional)"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  actions: read

jobs:
  web2apk-build:
    name: "Build Web2APK"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout repo ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java JDK ─────────────────────────────────────────────
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # ── 3. Setup Android SDK ──────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Setup Node.js ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 5. Install dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: |
          npm install -g @nicepkg/gpt @aspect-build/rules_js 2>/dev/null || true

      # ── 6. Buat project WebView Android ───────────────────────────────
      - name: Generate WebView APK project
        env:
          WEB_URL: ${{ inputs.web_url }}
          APP_NAME: ${{ inputs.app_name }}
          ICON_URL: ${{ inputs.icon_url }}
        run: |
          mkdir -p Web2APK/app/src/main/assets
          
          # ── Create basic Android WebView project structure ──
          
          # settings.gradle
          cat > Web2APK/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolution {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "web2apk"
          include ':app'
          EOF
          
          # Fix settings.gradle (heredoc indentation)
          sed -i 's/^          //' Web2APK/settings.gradle
          
          # build.gradle (root)
          cat > Web2APK/build.gradle << 'GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          GRADLE
          
          # gradle.properties
          cat > Web2APK/gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
          
          # gradle wrapper
          mkdir -p Web2APK/gradle/wrapper
          cat > Web2APK/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Download gradlew
          curl -sL https://raw.githubusercontent.com/gradle/gradle/master/gradlew -o Web2APK/gradlew
          chmod +x Web2APK/gradlew
          
          # app/build.gradle
          SAFE_NAME=$(echo "$APP_NAME" | sed 's/[^a-zA-Z0-9]/_/g' | tr '[:upper:]' '[:lower:]')
          PACKAGE_NAME="com.web2apk.${SAFE_NAME:-app}"
          
          mkdir -p Web2APK/app/src/main/java/$(echo $PACKAGE_NAME | tr '.' '/')
          PACKAGE_DIR="Web2APK/app/src/main/java/$(echo $PACKAGE_NAME | tr '.' '/')"
          
          cat > Web2APK/app/build.gradle << GRADLEEOF
          plugins {
              id 'com.android.application'
          }
          android {
              namespace '${PACKAGE_NAME}'
              compileSdk 34
              defaultConfig {
                  applicationId "${PACKAGE_NAME}"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          GRADLEEOF
          
          # AndroidManifest.xml
          cat > Web2APK/app/src/main/AndroidManifest.xml << MANIFEST
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application
                  android:allowBackup="true"
                  android:label="${APP_NAME}"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboard">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
          
          # MainActivity.java
          cat > "${PACKAGE_DIR}/MainActivity.java" << JAVAEOF
          package ${PACKAGE_NAME};
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setUseWideViewPort(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setSupportZoom(false);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.loadUrl("${WEB_URL}");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVAEOF
          
          # Download icon jika ada
          if [ -n "$ICON_URL" ]; then
            echo "Downloading icon..."
            curl -sL "$ICON_URL" -o Web2APK/app/src/main/res/icon_tmp.png 2>/dev/null || true
          fi
          
          # Buat resource dirs dan default launcher icon
          mkdir -p Web2APK/app/src/main/res/values
          mkdir -p Web2APK/app/src/main/res/mipmap-hdpi
          mkdir -p Web2APK/app/src/main/res/mipmap-mdpi
          mkdir -p Web2APK/app/src/main/res/mipmap-xhdpi
          mkdir -p Web2APK/app/src/main/res/mipmap-xxhdpi
          mkdir -p Web2APK/app/src/main/res/mipmap-xxxhdpi
          
          # strings.xml
          cat > Web2APK/app/src/main/res/values/strings.xml << STRXML
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${APP_NAME}</string>
          </resources>
          STRXML
          
          # styles.xml
          cat > Web2APK/app/src/main/res/values/styles.xml << STYLEXML
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="android:Theme.Material.Light.NoActionBar"/>
          </resources>
          STYLEXML
          
          echo "Web2APK project generated successfully!"
          echo "Package: ${PACKAGE_NAME}"
          echo "URL: ${WEB_URL}"
          echo "App Name: ${APP_NAME}"

      # ── 7. Build APK ──────────────────────────────────────────────────
      - name: Build Web2APK
        working-directory: Web2APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── 8. Cari & simpan APK ──────────────────────────────────────────
      - name: Locate APK output
        id: apk
        run: |
          APK_FILE=$(find Web2APK -name "*.apk" -type f | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "ERROR: File APK tidak ditemukan setelah build!"
            exit 1
          fi
          echo "APK ditemukan: $APK_FILE"
          echo "APK size: $(du -h "$APK_FILE" | cut -f1)"
          
          cp "$APK_FILE" ./output.apk
          echo "path=./output.apk" >> $GITHUB_OUTPUT

      # ── 9. Upload sebagai Artifact ────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ inputs.app_name }}
          path: ./output.apk
          retention-days: 1
          if-no-files-found: error
