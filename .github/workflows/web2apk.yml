name: Web to APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
      app_name:
        description: 'App Name'
        required: true
      icon_url:
        description: 'Icon URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Download Icon
        run: |
          curl -L -o icon.png "${{ github.event.inputs.icon_url }}"
          ls -la icon.png

      - name: Create WebView Project
        run: |
          flutter create --project-name web2apk_${{ github.run_id }} temp_project
          cd temp_project
          
          # Copy icon ke assets
          mkdir -p assets
          cp ../icon.png assets/icon.png

      - name: Setup WebView Code
        run: |
          cd temp_project
          
          # Update pubspec.yaml
          cat > pubspec.yaml << 'EOF'
          name: web2apk_${{ github.run_id }}
          description: ${{ github.event.inputs.app_name }}
          publish_to: 'none'
          version: 1.0.0+1
          
          environment:
            sdk: '>=3.0.0 <4.0.0'
          
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.7.0
          
          flutter:
            uses-material-design: true
            assets:
              - assets/icon.png
          EOF
          
          # Buat main.dart
          cat > lib/main.dart << 'DART_EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          
          void main() => runApp(const MyApp());
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
          
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ github.event.inputs.app_name }}',
                debugShowCheckedModeBanner: false,
                home: const WebViewScreen(),
              );
            }
          }
          
          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
          
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }
          
          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;
          
            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(Uri.parse('${{ github.event.inputs.web_url }}'));
            }
          
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text('${{ github.event.inputs.app_name }}'),
                  backgroundColor: Colors.blue,
                ),
                body: WebViewWidget(controller: controller),
              );
            }
          }
          DART_EOF

      - name: Build APK
        run: |
          cd temp_project
          flutter pub get
          flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: temp_project/build/app/outputs/flutter-apk/*.apk
