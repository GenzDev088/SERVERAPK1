name: Web to APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        required: true
      app_name:
        required: true
      icon_url:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Web2APK
        run: |
          echo "Web URL: ${{ inputs.web_url }}"
          echo "App Name: ${{ inputs.app_name }}"
          # Tambahkan logic web2apk di sini nanti
          echo "Web2APK build finished"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-result
          path: ./*.apk
