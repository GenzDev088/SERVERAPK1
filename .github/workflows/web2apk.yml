
# ═══════════════════════════════════════════════════════════════
# WORKFLOW 2: WEB2APK (web2apk.yml)
# ═══════════════════════════════════════════════════════════════
web2apk_workflow = '''name: 🌐 Web to APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website yang akan dijadikan APK'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon/Logo (PNG)'
        required: true
        type: string

env:
  JAVA_VERSION: "17"
  GRADLE_VERSION: "8.5"
  ANDROID_API: "34"
  BUILD_TOOLS: "34.0.0"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Java ────────────────────────────────────────
      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ── 3. Setup Android SDK ─────────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📝 Accept Licenses & Install Tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-${{ env.ANDROID_API }}" "build-tools;${{ env.BUILD_TOOLS }}"

      # ── 4. Download Icon ─────────────────────────────────────
      - name: 🖼️ Download Icon
        run: |
          mkdir -p assets
          curl -L -o assets/icon.png "${{ inputs.icon_url }}"
          echo "📊 Icon size:"
          ls -lh assets/icon.png
          file assets/icon.png

      # ── 5. Create Android Project Structure ────────────────────
      - name: 🏗️ Create Android WebView Project
        run: |
          APP_NAME="${{ inputs.app_name }}"
          PACKAGE_NAME="com.webapp.$(echo $APP_NAME | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd 'a-z0-9_')"
          
          echo "📦 Package: $PACKAGE_NAME"
          echo "📱 App Name: $APP_NAME"
          
          mkdir -p web2apk-project/app/src/main/java/com/webapp
          mkdir -p web2apk-project/app/src/main/res/{mipmap-hdpi,mipmap-mdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi,mipmap-anydpi-v26}
          mkdir -p web2apk-project/app/src/main/res/layout
          mkdir -p web2apk-project/app/src/main/res/values
          mkdir -p web2apk-project/app/src/main/res/xml

      # ── 6. Create build.gradle (Project) ───────────────────────
      - name: 📝 Create Project build.gradle
        run: |
          cat > web2apk-project/build.gradle << 'EOF'
          // Top-level build file
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

      # ── 7. Create settings.gradle ──────────────────────────────
      - name: 📝 Create settings.gradle
        run: |
          cat > web2apk-project/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Web2Apk"
          include ':app'
          EOF

      # ── 8. Create gradle.properties ────────────────────────────
      - name: 📝 Create gradle.properties
        run: |
          cat > web2apk-project/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          EOF

      # ── 9. Create app/build.gradle ─────────────────────────────
      - name: 📝 Create App build.gradle
        run: |
          APP_NAME="${{ inputs.app_name }}"
          SAFE_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd 'a-z0-9_')
          PACKAGE="com.webapp.$SAFE_NAME"
          
          cat > web2apk-project/app/build.gradle << EOF
          plugins {
              id 'com.android.application'
          }

          android {
              namespace '$PACKAGE'
              compileSdk 34

              defaultConfig {
                  applicationId "$PACKAGE"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
          }
          EOF

      # ── 10. Create AndroidManifest.xml ─────────────────────────
      - name: 📝 Create AndroidManifest.xml
        run: |
          APP_NAME="${{ inputs.app_name }}"
          SAFE_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd 'a-z0-9_')
          PACKAGE="com.webapp.$SAFE_NAME"
          
          cat > web2apk-project/app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="$PACKAGE">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.Web2Apk"
                  android:usesCleartextTraffic="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # ── 11. Create MainActivity.java ───────────────────────────
      - name: 📝 Create MainActivity.java
        run: |
          APP_NAME="${{ inputs.app_name }}"
          SAFE_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd 'a-z0-9_')
          PACKAGE="com.webapp.$SAFE_NAME"
          URL="${{ inputs.web_url }}"
          
          mkdir -p web2apk-project/app/src/main/java/$(echo $PACKAGE | tr '.' '/')
          
          cat > web2apk-project/app/src/main/java/$(echo $PACKAGE | tr '.' '/')/MainActivity.java << EOF
          package $PACKAGE;

          import android.annotation.SuppressLint;
          import android.graphics.Bitmap;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.view.View;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.ProgressBar;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.swiperefreshlayout.widget.SwipeRefreshLayout;

          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private ProgressBar progressBar;
              private SwipeRefreshLayout swipeRefresh;

              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  webView = findViewById(R.id.webView);
                  progressBar = findViewById(R.id.progressBar);
                  swipeRefresh = findViewById(R.id.swipeRefresh);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setUserAgentString("Mozilla/5.0 (Linux; Android 14; Mobile) AppleWebKit/537.36");

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onPageStarted(WebView view, String url, Bitmap favicon) {
                          progressBar.setVisibility(View.VISIBLE);
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          progressBar.setVisibility(View.GONE);
                          swipeRefresh.setRefreshing(false);
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onProgressChanged(WebView view, int newProgress) {
                          progressBar.setProgress(newProgress);
                      }
                  });

                  swipeRefresh.setOnRefreshListener(() -> webView.reload());

                  webView.loadUrl("$URL");
              }

              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BACK && webView.canGoBack()) {
                      webView.goBack();
                      return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }
          }
          EOF

      # ── 12. Create Layout ──────────────────────────────────────
      - name: 📝 Create Layout XML
        run: |
          cat > web2apk-project/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.swiperefreshlayout.widget.SwipeRefreshLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/swipeRefresh"
              android:layout_width="match_parent"
              android:layout_height="match_parent">

              <RelativeLayout
                  android:layout_width="match_parent"
                  android:layout_height="match_parent">

                  <ProgressBar
                      android:id="@+id/progressBar"
                      style="?android:attr/progressBarStyleHorizontal"
                      android:layout_width="match_parent"
                      android:layout_height="3dp"
                      android:layout_alignParentTop="true"
                      android:progressDrawable="@drawable/progress_drawable"
                      android:visibility="gone" />

                  <WebView
                      android:id="@+id/webView"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      android:layout_below="@id/progressBar" />
              </RelativeLayout>
          </androidx.swiperefreshlayout.widget.SwipeRefreshLayout>
          EOF

      # ── 13. Create Resources ───────────────────────────────────
      - name: 📝 Create Resources
        run: |
          APP_NAME="${{ inputs.app_name }}"
          
          cat > web2apk-project/app/src/main/res/values/strings.xml << EOF
          <resources>
              <string name="app_name">$APP_NAME</string>
          </resources>
          EOF

          cat > web2apk-project/app/src/main/res/values/colors.xml << 'EOF'
          <resources>
              <color name="purple_200">#FFBB86FC</color>
              <color name="purple_500">#FF6200EE</color>
              <color name="purple_700">#FF3700B3</color>
              <color name="teal_200">#FF03DAC5</color>
              <color name="teal_700">#FF018786</color>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

          cat > web2apk-project/app/src/main/res/values/themes.xml << 'EOF'
          <resources>
              <style name="Theme.Web2Apk" parent="Theme.Material3.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/purple_500</item>
                  <item name="colorPrimaryVariant">@color/purple_700</item>
                  <item name="colorOnPrimary">@color/white</item>
                  <item name="android:statusBarColor">@color/purple_700</item>
              </style>
          </resources>
          EOF

          mkdir -p web2apk-project/app/src/main/res/drawable
          cat > web2apk-project/app/src/main/res/drawable/progress_drawable.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:id="@android:id/progress">
                  <clip>
                      <shape android:shape="rectangle">
                          <solid android:color="@color/purple_500" />
                      </shape>
                  </clip>
              </item>
          </layer-list>
          EOF

      # ── 14. Process Icon (resize untuk semua density) ──────────
      - name: 🖼️ Process Icon
        run: |
          # Install ImageMagick untuk resize icon
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          ICON_SRC="assets/icon.png"
          RES_DIR="web2apk-project/app/src/main/res"
          
          # Generate icon untuk semua density
          convert "$ICON_SRC" -resize 72x72   "$RES_DIR/mipmap-hdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 48x48   "$RES_DIR/mipmap-mdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 96x96   "$RES_DIR/mipmap-xhdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 144x144 "$RES_DIR/mipmap-xxhdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 192x192 "$RES_DIR/mipmap-xxxhdpi/ic_launcher.png"
          
          # Round icons
          cp "$RES_DIR/mipmap-hdpi/ic_launcher.png"   "$RES_DIR/mipmap-hdpi/ic_launcher_round.png"
          cp "$RES_DIR/mipmap-mdpi/ic_launcher.png"   "$RES_DIR/mipmap-mdpi/ic_launcher_round.png"
          cp "$RES_DIR/mipmap-xhdpi/ic_launcher.png"  "$RES_DIR/mipmap-xhdpi/ic_launcher_round.png"
          cp "$RES_DIR/mipmap-xxhdpi/ic_launcher.png" "$RES_DIR/mipmap-xxhdpi/ic_launcher_round.png"
          cp "$RES_DIR/mipmap-xxxhdpi/ic_launcher.png" "$RES_DIR/mipmap-xxxhdpi/ic_launcher_round.png"
          
          echo "✅ Icons generated"

      # ── 15. Build APK ──────────────────────────────────────────
      - name: 🔨 Build APK
        working-directory: web2apk-project
        run: |
          # Download Gradle wrapper
          gradle_version="${{ env.GRADLE_VERSION }}"
          mkdir -p gradle/wrapper
          
          cat > gradle/wrapper/gradle-wrapper.properties << EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\\://services.gradle.org/distributions/gradle-${gradle_version}-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Download wrapper jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v${gradle_version}.0/gradle/wrapper/gradle-wrapper.jar" || \
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v${gradle_version}.0/gradle/wrapper/gradle-wrapper.jar"
          
          # Build script
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec java -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew
          
          echo "🔨 Starting build..."
          ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 16. Verify & Rename Output ─────────────────────────────
      - name: ✅ Verify & Rename APK
        run: |
          APK_SRC=$(find web2apk-project/app/build/outputs/apk/ -name "*.apk" | head -1)
          if [ -z "$APK_SRC" ]; then
            echo "❌ APK tidak ditemukan!"
            find web2apk-project/ -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          
          SAFE_NAME=$(echo "${{ inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd 'a-z0-9_')
          APK_OUT="web2apk-${SAFE_NAME}.apk"
          cp "$APK_SRC" "$APK_OUT"
          echo "✅ APK: $APK_OUT"
          ls -lh "$APK_OUT"
          echo "apk_path=$APK_OUT" >> $GITHUB_ENV

      # ── 17. Upload Artifact ────────────────────────────────────
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ inputs.app_name }}-${{ github.run_id }}
          path: ${{ env.apk_path }}
          retention-days: 7
          if-no-files-found: error

      # ── 18. Cleanup ────────────────────────────────────────────
      - name: 🧹 Cleanup
        if: always()
        run: rm -rf web2apk-project/ assets/
'''

with open(f"{output_dir}/web2apk.yml", "w") as f:
    f.write(web2apk_workflow)

print("✅ web2apk.yml created")
